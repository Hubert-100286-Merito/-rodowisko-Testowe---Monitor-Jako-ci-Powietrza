name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Konfiguracja Pythona (dla backendu)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Linter (Sprawdzanie błędów składni Pythona)
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          # Zatrzymuje build, jeśli są krytyczne błędy w kodzie Krzyśka
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Testowe budowanie obrazów Docker
        run: docker-compose build
