name: CI Monitor Jakości Powietrza

# Wyzwalacz: uruchamiaj przy każdym pushu i PR na główne gałęzie 
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Pobranie kodu z repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Pythona (Backend)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja lintera (flake8)
        run: pip install flake8

      - [cite_start]name: Linting - sprawdzanie czystości kodu [cite: 143]
        run: |
          # Sprawdza krytyczne błędy w folderze backend
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - [cite_start]name: Testowe budowanie obrazów Docker [cite: 45, 143]
        run: |
          docker-compose build
