name: CI Monitor Jakości Powietrza

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Sprawdzanie jakości kodu (Linting)
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install flake8 pytest
          # Jeśli Krzysztof ma już requirements.txt:
          # pip install -r requirements.txt

      - name: Lint Python (Backend)
        run: |
          # Sprawdza błędy składni i stylu (flake8)
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Set up Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

  # 2. Budowanie obrazów Docker (Build) - RNF-02
  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build ./backend -t air-quality-backend:latest

      - name: Build Frontend Image
        run: docker build ./frontend -t air-quality-frontend:latest
